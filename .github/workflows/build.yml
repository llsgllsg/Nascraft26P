name: Build for Minecraft 26.1.2

on:
  workflow_dispatch:
    inputs:
      mc_version:
        description: '版本'
        required: true
        default: '26.1.2'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      # 关键修改：使用 setup-gradle 安装指定版本
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.1'   # 直接指定版本

      - name: Update paper-api version in build.gradle.kts
        run: |
          sed -i 's/compileOnly("io.papermc.paper:paper-api:.*"/compileOnly("io.papermc.paper:paper-api:${{ github.event.inputs.mc_version }}-R0.1-SNAPSHOT"/g' build.gradle.kts

      - name: Build with Gradle
        run: gradle build --no-daemon --stacktrace   # 注意：使用 gradle 而不是 ./gradlew
