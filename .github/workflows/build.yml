name: Build for Minecraft 26.1.2

on:
  workflow_dispatch:
    inputs:
      mc_version:
        description: '目标Minecraft版本 (例如 26.1.2)'
        required: true
        default: '26.1.2'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      # 直接安装指定版本的 Gradle，绕过项目中的 gradlew
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.1'

      # 不再使用 sed 修改版本号，完全依赖你在 build.gradle.kts 中的手动配置
      - name: Build with Gradle
        run: gradle build --no-daemon --stacktrace

      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nascraft-${{ github.event.inputs.mc_version }}
          path: build/libs/*.jar
